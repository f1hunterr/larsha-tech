services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: "4000"
      DB_PATH: /data/leads.db
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      NODE_ENV: production
    volumes:
      - leads_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

  web:
    build: .
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  leads_data:
