kind = "web"
previewPath = "/"
title = "Larsha Technologies"
version = "1.0.0"
id = "artifacts/larsha-tech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24081

[services.development]
run = "pnpm --filter @workspace/larsha-tech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/larsha-tech", "run", "build" ]
publicDir = "artifacts/larsha-tech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24081"
BASE_PATH = "/"
