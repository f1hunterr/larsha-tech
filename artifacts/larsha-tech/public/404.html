<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Larsha Tech</title>
  <!--
    SPA redirect for GitHub Pages (rafgraph/spa-github-pages approach).
    Encodes the full path into a query string and redirects to the app root,
    which then restores the URL via history.replaceState.
    pathSegmentsToKeep=1 because the app lives at /larsha-tech/ (1 segment).
  -->
  <script>
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
